name: OIC Project Migration

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "Source OIC project ID"
        required: true
      project_name:
        description: "Project name used for naming the CAR file"
        required: true
      deployment_label:
        description: "Optional deployment label, for example 01.00.0000"
        required: false
        default: ""
      activate_after_import:
        description: "Activate integrations after import"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      integration_ids_to_activate:
        description: "Comma-separated integration IDs, for example HELLO_WORLD|01.00.0000,ERP_SYNC|01.00.0001"
        required: false
        default: ""

concurrency:
  group: oic-project-migration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  export-import:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SOURCE_OIC_BASE_URL: ${{ secrets.SOURCE_OIC_BASE_URL }}
      SOURCE_OIC_TOKEN_URL: ${{ secrets.SOURCE_OIC_TOKEN_URL }}
      SOURCE_OIC_CLIENT_ID: ${{ secrets.SOURCE_OIC_CLIENT_ID }}
      SOURCE_OIC_CLIENT_SECRET: ${{ secrets.SOURCE_OIC_CLIENT_SECRET }}

      TARGET_OIC_BASE_URL: ${{ secrets.TARGET_OIC_BASE_URL }}
      TARGET_OIC_TOKEN_URL: ${{ secrets.TARGET_OIC_TOKEN_URL }}
      TARGET_OIC_CLIENT_ID: ${{ secrets.TARGET_OIC_CLIENT_ID }}
      TARGET_OIC_CLIENT_SECRET: ${{ secrets.TARGET_OIC_CLIENT_SECRET }}
      TARGET_OIC_INSTANCE: ${{ secrets.TARGET_OIC_INSTANCE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_VARS=(
            SOURCE_OIC_BASE_URL
            SOURCE_OIC_TOKEN_URL
            SOURCE_OIC_CLIENT_ID
            SOURCE_OIC_CLIENT_SECRET
            TARGET_OIC_BASE_URL
            TARGET_OIC_TOKEN_URL
            TARGET_OIC_CLIENT_ID
            TARGET_OIC_CLIENT_SECRET
            TARGET_OIC_INSTANCE
          )

          for v in "${REQUIRED_VARS[@]}"; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required secret: $v"
              exit 1
            fi
          done

      - name: Set archive filename
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          SAFE_NAME="$(echo "${{ github.event.inputs.project_name }}" | tr ' ' '_' | tr -cd '[:alnum:]_.-')"
          FILE_NAME="${SAFE_NAME}_$(date -u +%Y%m%d%H%M%S).car"
          echo "file_name=$FILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Install jq
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate source OAuth token
        id: source_token
        shell: bash
        run: |
          set -euo pipefail

          RESPONSE_FILE="$(mktemp)"
          HTTP_CODE="$(
            curl --silent --show-error --write-out "%{http_code}" \
              --output "$RESPONSE_FILE" \
              -X POST "$SOURCE_OIC_TOKEN_URL" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -u "$SOURCE_OIC_CLIENT_ID:$SOURCE_OIC_CLIENT_SECRET" \
              -d "grant_type=client_credentials"
          )"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Failed to obtain source token. HTTP status: $HTTP_CODE"
            cat "$RESPONSE_FILE"
            exit 1
          fi

          ACCESS_TOKEN="$(jq -r '.access_token // empty' "$RESPONSE_FILE")"
          EXPIRES_IN="$(jq -r '.expires_in // 0' "$RESPONSE_FILE")"

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Source token response did not include access_token"
            cat "$RESPONSE_FILE"
            exit 1
          fi

          echo "::add-mask::$ACCESS_TOKEN"
          echo "token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"
          echo "expires_in=$EXPIRES_IN" >> "$GITHUB_OUTPUT"

      - name: Export project from source OIC
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_ID="${{ github.event.inputs.project_id }}"
          DEPLOYMENT_LABEL="${{ github.event.inputs.deployment_label }}"
          OUTPUT_FILE="${{ steps.vars.outputs.file_name }}"

          if [ -n "$DEPLOYMENT_LABEL" ]; then
            cat > export_payload.json <<EOF
          {
            "name": "${{ github.event.inputs.project_name }}",
            "code": "${{ github.event.inputs.project_name }}",
            "type": "DEVELOPED",
            "label": "$DEPLOYMENT_LABEL"
          }
          EOF
          else
            cat > export_payload.json <<EOF
          {
            "name": "${{ github.event.inputs.project_name }}",
            "code": "${{ github.event.inputs.project_name }}",
            "type": "DEVELOPED"
          }
          EOF
          fi

          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${{ steps.source_token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -o "$OUTPUT_FILE" \
            "$SOURCE_OIC_BASE_URL/ic/api/integration/v1/projects/$PROJECT_ID/archive" \
            -d @export_payload.json

          test -s "$OUTPUT_FILE"

      - name: Upload exported CAR as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: oic-project-car
          path: ${{ steps.vars.outputs.file_name }}

      - name: Generate target OAuth token
        id: target_token
        shell: bash
        run: |
          set -euo pipefail

          RESPONSE_FILE="$(mktemp)"
          HTTP_CODE="$(
            curl --silent --show-error --write-out "%{http_code}" \
              --output "$RESPONSE_FILE" \
              -X POST "$TARGET_OIC_TOKEN_URL" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -u "$TARGET_OIC_CLIENT_ID:$TARGET_OIC_CLIENT_SECRET" \
              -d "grant_type=client_credentials"
          )"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Failed to obtain target token. HTTP status: $HTTP_CODE"
            cat "$RESPONSE_FILE"
            exit 1
          fi

          ACCESS_TOKEN="$(jq -r '.access_token // empty' "$RESPONSE_FILE")"
          EXPIRES_IN="$(jq -r '.expires_in // 0' "$RESPONSE_FILE")"

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Target token response did not include access_token"
            cat "$RESPONSE_FILE"
            exit 1
          fi

          echo "::add-mask::$ACCESS_TOKEN"
          echo "token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"
          echo "expires_in=$EXPIRES_IN" >> "$GITHUB_OUTPUT"

      - name: Import project into target OIC
        shell: bash
        run: |
          set -euo pipefail

          FILE_NAME="${{ steps.vars.outputs.file_name }}"

          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${{ steps.target_token.outputs.token }}" \
            -H "Accept: application/json" \
            -F "file=@${FILE_NAME}" \
            -F "type=application/octet-stream" \
            "$TARGET_OIC_BASE_URL/ic/api/integration/v1/projects/archive?integrationInstance=$TARGET_OIC_INSTANCE"

      - name: Refresh target OAuth token before activation
        if: ${{ github.event.inputs.activate_after_import == 'true' && github.event.inputs.integration_ids_to_activate != '' }}
        id: target_token_refresh
        shell: bash
        run: |
          set -euo pipefail

          RESPONSE_FILE="$(mktemp)"
          HTTP_CODE="$(
            curl --silent --show-error --write-out "%{http_code}" \
              --output "$RESPONSE_FILE" \
              -X POST "$TARGET_OIC_TOKEN_URL" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -u "$TARGET_OIC_CLIENT_ID:$TARGET_OIC_CLIENT_SECRET" \
              -d "grant_type=client_credentials"
          )"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Failed to refresh target token. HTTP status: $HTTP_CODE"
            cat "$RESPONSE_FILE"
            exit 1
          fi

          ACCESS_TOKEN="$(jq -r '.access_token // empty' "$RESPONSE_FILE")"

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Refresh token response did not include access_token"
            cat "$RESPONSE_FILE"
            exit 1
          fi

          echo "::add-mask::$ACCESS_TOKEN"
          echo "token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Activate integrations in target OIC
        if: ${{ github.event.inputs.activate_after_import == 'true' && github.event.inputs.integration_ids_to_activate != '' }}
        shell: bash
        run: |
          set -euo pipefail

          IFS=',' read -ra IDS <<< "${{ github.event.inputs.integration_ids_to_activate }}"

          for RAW_ID in "${IDS[@]}"; do
            ID="$(echo "$RAW_ID" | xargs)"
            ENCODED_ID="${ID//|/%7C}"

            cat > activate_payload.json <<EOF
          {
            "status": "CONFIGURED",
            "code": "${ID%%|*}",
            "version": "${ID##*|}",
            "enabled": true
          }
          EOF

            curl --fail --silent --show-error \
              -X POST \
              -H "Authorization: Bearer ${{ steps.target_token_refresh.outputs.token }}" \
              -H "Content-Type: application/json" \
              -H "X-HTTP-Method-Override: PATCH" \
              "$TARGET_OIC_BASE_URL/ic/api/integration/v1/integrations/$ENCODED_ID?integrationInstance=$TARGET_OIC_INSTANCE" \
              -d @activate_payload.json

            echo "Activated: $ID"
          done
