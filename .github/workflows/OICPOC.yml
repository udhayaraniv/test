- name: Export project from source OIC
  id: export_project
  shell: bash
  run: |
    set -euo pipefail

    EXPORT_URL="https://${SRC_OIC_HOST}/ic/api/integration/v1/projects/${PROJECT_ID}/archive?integrationInstance=${SRC_OIC_INSTANCE}"

    echo "Export URL: $EXPORT_URL"
    echo "Project: $PROJECT_ID"

    if [ -n "$DEPLOYMENT_LABEL" ]; then
      cat > request_payload.json <<EOF
    {
      "name": "${PROJECT_NAME}",
      "code": "${PROJECT_ID}",
      "type": "${PROJECT_TYPE}",
      "builtBy": "",
      "label": "${DEPLOYMENT_LABEL}"
    }
    EOF

      HTTP_CODE=$(curl -sS -w "%{http_code}" \
        -o "${ARCHIVE_NAME}" \
        -X POST "$EXPORT_URL" \
        -H "Authorization: Bearer ${{ steps.src_token.outputs.token }}" \
        -H "Content-Type: application/json" \
        --data @request_payload.json)

    else
      HTTP_CODE=$(curl -sS -w "%{http_code}" \
        -o "${ARCHIVE_NAME}" \
        -X POST "$EXPORT_URL" \
        -H "Authorization: Bearer ${{ steps.src_token.outputs.token }}")
    fi

    echo "HTTP Status: $HTTP_CODE"

    if [ "$HTTP_CODE" != "200" ]; then
      echo "Export failed. Response:"
      cat "${ARCHIVE_NAME}" || true
      exit 1
    fi

    if [ ! -s "${ARCHIVE_NAME}" ]; then
      echo "Archive is empty!"
      exit 1
    fi

    echo "Export successful"
    echo "archive=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
