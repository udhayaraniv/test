name: OIC Project Promotion

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "OIC project ID"
        required: true
      project_code:
        description: "OIC project code"
        required: true
      project_name:
        description: "OIC project name"
        required: true
      project_label:
        description: "Deployment label/version to export, for example 01.00.0000"
        required: true
      artifact_name:
        description: "Archive file name"
        required: false
        default: "oic-project.car"

jobs:
  export-from-source:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.vars.outputs.artifact_name }}

    steps:
      - name: Prepare variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          echo "artifact_name=${{ github.event.inputs.artifact_name }}" >> "$GITHUB_OUTPUT"

      - name: Get OAuth token
        id: token
        shell: bash
        env:
          IDENTITY_DOMAIN_URL: ${{ secrets.IDENTITY_DOMAIN_URL }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          TOKEN_RESPONSE=$(curl -sS -X POST \
            "${IDENTITY_DOMAIN_URL}/oauth2/v1/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -u "${OAUTH_CLIENT_ID}:${OAUTH_CLIENT_SECRET}" \
            -d "grant_type=client_credentials")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Failed to obtain access token"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Export OIC project from source
        shell: bash
        env:
          SRC_OIC_BASE_URL: ${{ secrets.SRC_OIC_BASE_URL }}
          SRC_OIC_INSTANCE: ${{ secrets.SRC_OIC_INSTANCE }}
          ACCESS_TOKEN: ${{ steps.token.outputs.access_token }}
        run: |
          set -euo pipefail

          cat > request_payload.json <<EOF
          {
            "name": "${{ github.event.inputs.project_name }}",
            "code": "${{ github.event.inputs.project_code }}",
            "type": "DEVELOPED",
            "label": "${{ github.event.inputs.project_label }}"
          }
          EOF

          curl -f -sS -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -o "${{ steps.vars.outputs.artifact_name }}" \
            "${SRC_OIC_BASE_URL}/ic/api/integration/v1/projects/${{ github.event.inputs.project_id }}/archive?integrationInstance=${SRC_OIC_INSTANCE}" \
            -d @request_payload.json

          test -s "${{ steps.vars.outputs.artifact_name }}"

      - name: Upload exported archive
        uses: actions/upload-artifact@v4
        with:
          name: exported-oic-project
          path: ${{ steps.vars.outputs.artifact_name }}

  import-to-target:
    runs-on: ubuntu-latest
    needs: export-from-source
    environment: test

    steps:
      - name: Download exported archive
        uses: actions/download-artifact@v4
        with:
          name: exported-oic-project

      - name: Get OAuth token
        id: token
        shell: bash
        env:
          IDENTITY_DOMAIN_URL: ${{ secrets.IDENTITY_DOMAIN_URL }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          TOKEN_RESPONSE=$(curl -sS -X POST \
            "${IDENTITY_DOMAIN_URL}/oauth2/v1/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -u "${OAUTH_CLIENT_ID}:${OAUTH_CLIENT_SECRET}" \
            -d "grant_type=client_credentials")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Failed to obtain access token"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Import project into target
        shell: bash
        env:
          TGT_OIC_BASE_URL: ${{ secrets.TGT_OIC_BASE_URL }}
          TGT_OIC_INSTANCE: ${{ secrets.TGT_OIC_INSTANCE }}
          ACCESS_TOKEN: ${{ steps.token.outputs.access_token }}
        run: |
          set -euo pipefail

          curl -f -sS -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -F "file=@${{ needs.export-from-source.outputs.artifact_name }}" \
            -F "type=application/octet-stream" \
            "${TGT_OIC_BASE_URL}/ic/api/integration/v1/projects/archive?integrationInstance=${TGT_OIC_INSTANCE}"

      - name: Post-import reminder
        shell: bash
        run: |
          echo "Project imported."
          echo "Next: update environment-specific connections, credentials, certificates, and run smoke tests."
