name: OIC Project Migration

on:
  workflow_dispatch:
    inputs:
      project_code:
        description: "OIC Project Code"
        required: true
        type: string
      activate:
        description: "Activate after import"
        required: true
        default: false
        type: boolean

jobs:
  migrate:
    runs-on: ubuntu-latest

    env:
      OCI_IDENTITY_URL: ${{ secrets.OCI_IDENTITY_URL }}

      SOURCE_CLIENT_ID: ${{ secrets.SOURCE_CLIENT_ID }}
      SOURCE_CLIENT_SECRET: ${{ secrets.SOURCE_CLIENT_SECRET }}

      TARGET_CLIENT_ID: ${{ secrets.TARGET_CLIENT_ID }}
      TARGET_CLIENT_SECRET: ${{ secrets.TARGET_CLIENT_SECRET }}

      SOURCE_BASE_URL: ${{ secrets.SOURCE_BASE_URL }}
      TARGET_BASE_URL: ${{ secrets.TARGET_BASE_URL }}

      SOURCE_INSTANCE: ${{ secrets.SOURCE_INSTANCE }}
      TARGET_INSTANCE: ${{ secrets.TARGET_INSTANCE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate source access token
        shell: bash
        run: |
          set -euo pipefail

          RESPONSE=$(curl -sS -X POST "${OCI_IDENTITY_URL}/oauth2/v1/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -u "${SOURCE_CLIENT_ID}:${SOURCE_CLIENT_SECRET}" \
            -d "grant_type=client_credentials" \
            -d "scope=urn:opc:idm:__myscopes__")

          SOURCE_TOKEN=$(echo "${RESPONSE}" | jq -r '.access_token // empty')

          if [ -z "${SOURCE_TOKEN}" ]; then
            echo "Failed to generate SOURCE token"
            echo "${RESPONSE}"
            exit 1
          fi

          echo "::add-mask::${SOURCE_TOKEN}"
          echo "SOURCE_TOKEN=${SOURCE_TOKEN}" >> "${GITHUB_ENV}"

      - name: Generate target access token
        shell: bash
        run: |
          set -euo pipefail

          RESPONSE=$(curl -sS -X POST "${OCI_IDENTITY_URL}/oauth2/v1/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -u "${TARGET_CLIENT_ID}:${TARGET_CLIENT_SECRET}" \
            -d "grant_type=client_credentials" \
            -d "scope=urn:opc:idm:__myscopes__")

          TARGET_TOKEN=$(echo "${RESPONSE}" | jq -r '.access_token // empty')

          if [ -z "${TARGET_TOKEN}" ]; then
            echo "Failed to generate TARGET token"
            echo "${RESPONSE}"
            exit 1
          fi

          echo "::add-mask::${TARGET_TOKEN}"
          echo "TARGET_TOKEN=${TARGET_TOKEN}" >> "${GITHUB_ENV}"

      - name: Make migration script executable
        run: chmod +x scripts/migrate.sh

      - name: Run OIC project migration
        shell: bash
        run: |
          ./scripts/migrate.sh \
            "${{ inputs.project_code }}" \
            "${{ inputs.activate }}"

      - name: Upload exported archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oic-project-archive
          path: artifacts/*.car
          if-no-files-found: ignore
